<section class="w-full max-w-xl bg-white rounded-lg shadow-sm border border-gray-200">
    <div class="px-5 py-4 border-b border-gray-100">
        <h2 class="text-lg font-semibold text-gray-800">បង្កើតទិន្នន័យបុគ្គលិក</h2>
    </div>

    <form ng-submit="addEmployee()" class="p-5 space-y-4">
        <div>
            <label for="employee-fullname" class="block text-sm font-medium text-gray-700 mb-1">ឈ្មោះបុគ្គលិក</label>
            <input
                id="employee-fullname"
                type="text"
                ng-model="newEmployee.fullname"
                required
                class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            >
        </div>

        <div>
            <label for="employee-age" class="block text-sm font-medium text-gray-700 mb-1">អាយុ</label>
            <input
                id="employee-age"
                type="number"
                ng-model="newEmployee.age"
                required
                min="0"
                class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            >
        </div>

        <div>
            <label for="employee-address" class="block text-sm font-medium text-gray-700 mb-1">អាសយដ្ឋាន</label>
            <input
                id="employee-address"
                type="text"
                ng-model="newEmployee.address"
                required
                class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            >
        </div>

        <div>
            <label for="employee-birth" class="block text-sm font-medium text-gray-700 mb-1">ថ្ងៃខែឆ្នាំកំណើត</label>
            <input
                id="employee-birth"
                type="date"
                ng-model="newEmployee.birth"
                required
                class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            >
        </div>

        <div>
            <label for="employee-email" class="block text-sm font-medium text-gray-700 mb-1">អ៊ីម៉ែល</label>
            <input
                id="employee-email"
                type="email"
                ng-model="newEmployee.email"
                required
                class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            >
        </div>

        <div>
            <label for="employee-image" class="block text-sm font-medium text-gray-700 mb-1">រូបភាព</label>
            <input
                id="employee-image"
                type="file"
                accept="image/*"
                file-model="newEmployee.imageFile"
                required
                class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            >
        </div>

        <div>
            <label for="employee-department" class="block text-sm font-medium text-gray-700 mb-1">ផ្នែក</label>
            <input
                id="employee-department"
                type="text"
                ng-model="newEmployee.department"
                required
                class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            >
        </div>

        <div>
            <label for="employee-description" class="block text-sm font-medium text-gray-700 mb-1">មតិបន្ថែម</label>
            <textarea
                id="employee-description"
                ng-model="newEmployee.description"
                rows="3"
                class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            ></textarea>
        </div>

        <div>
            <label for="employee-position" class="block text-sm font-medium text-gray-700 mb-1">មុខដំណែង</label>
            <input
                id="employee-position"
                type="text"
                ng-model="newEmployee.position"
                required
                class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            >
        </div>

        <div class="pt-1">
            <button
                type="submit"
                class="inline-flex items-center rounded-md bg-blue-600 px-4 py-2 text-sm font-semibold text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-1"
            >
                បង្កើតទិន្នន័យបុគ្គលិក
            </button>
        </div>
    </form>
</section>
